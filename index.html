<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00C2FF" />
    <meta name="description" content="MesurePro — Application professionnelle de mesure immobilière 3D : modèle WebGL temps réel, plans architecte, rapports auditeur senior, laser Bluetooth." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MesurePro" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <title>MesurePro — Mesure immobilière 3D</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      /* Aucun scroll au niveau du body — les panneaux internes scrollent
         eux-mêmes (règle non-négo backlog item 8). Sur mobile/tablette,
         on relâche pour permettre le scroll natif quand le clavier
         virtuel monte. */
      body {
        background: #08111E; color: #E8EDF5;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        -webkit-text-size-adjust: 100%;       /* iOS : pas d'auto-zoom */
      }
      input, select, textarea, button { font-family: inherit; font-size: 100%; }
      /* iOS Safari : fontSize >= 16 px sur les inputs évite le zoom auto au focus */
      input, select, textarea { font-size: 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ============= LIGHT THEME — toggle via Paramètres → Préférences =============
         Approche pragmatique : CSS filter inverse les couleurs sur tout l'arbre,
         puis re-inverse sur les médias (img/video/canvas/SVG image) pour qu'ils
         restent en couleurs naturelles. Permet un thème clair fonctionnel sans
         refactorer 200+ inline styles inline.
         Trade-off : les couleurs accentuées peuvent paraître légèrement décalées
         vs un vrai light theme. Pour le bouton de bascule, voir Settings →
         Préférences. */
      html[data-theme="light"] {
        filter: invert(0.92) hue-rotate(180deg);
        background: #F5F2ED;
      }
      html[data-theme="light"] img,
      html[data-theme="light"] video,
      html[data-theme="light"] canvas,
      html[data-theme="light"] svg image,
      html[data-theme="light"] picture {
        filter: invert(1) hue-rotate(180deg);
      }
      html { transition: filter 0.2s ease; }

      /* ============= RESPONSIVE — règle non-négo backlog item 8 =============
         3 paliers : ordinateur (>1024 px) inchangé, tablette (≤1024 px),
         smartphone (≤640 px). On adapte la sidebar (collapse en bandeau
         icônes) et on fait scroller les panneaux internes. */

      /* Tablet — sidebar passe en mode icônes (W=64) */
      @media (max-width: 1024px) {
        body { overflow: hidden; }
        /* sidebar étroite */
        [style*="width: 210px"], [style*="width:210"] { width: 64px !important; }
        /* contenu principal : marge gauche réduite */
        [style*="margin-left: 210px"], [style*="margin-left:210"] { margin-left: 64px !important; }
        /* labels sidebar masqués (icônes seules) */
        .sidebar-label { display: none !important; }
      }

      /* Mobile — sidebar passe en bandeau bas, contenu plein écran */
      @media (max-width: 640px) {
        /* on autorise le scroll au niveau body car les panels ne tiennent
           plus en 100vh sur 6.1" (iPhone 13 portrait = 844 px de haut) */
        body { overflow: auto; }
        /* sidebar : position bottom, hauteur fixe 56 px, largeur 100% */
        [style*="position: fixed"][style*="height: 100vh"],
        [style*="position:fixed"][style*="height:100vh"] {
          width: 100% !important; height: 56px !important;
          top: auto !important; bottom: 0 !important;
          left: 0 !important;
          flex-direction: row !important;
          border-right: none !important;
          border-top: 1px solid #1C3050 !important;
          z-index: 1000 !important;
        }
        /* contenu : marge gauche supprimée, padding bottom pour la sidebar bottom */
        [style*="margin-left: 64px"], [style*="margin-left:64"],
        [style*="margin-left: 210px"], [style*="margin-left:210"] {
          margin-left: 0 !important;
          padding-bottom: 64px !important;
        }
        /* boutons header projet : flex-wrap pour ne pas déborder */
        [data-noprint] { flex-wrap: wrap !important; }
        /* Modal : largeur 100 % avec marges latérales */
        [style*="width: 600px"], [style*="width:600"] {
          width: calc(100vw - 24px) !important; max-width: calc(100vw - 24px) !important;
        }
        /* Cards Dashboard : 1 colonne */
        [style*="repeat(3,"] { grid-template-columns: 1fr !important; }
        [style*="repeat(2,"] { grid-template-columns: 1fr !important; }
        [style*="repeat(4,"] { grid-template-columns: repeat(2,1fr) !important; }
      }

      @media print {
        @page { margin: 14mm; }
        [data-noprint] { display: none !important; }
        body, body * {
          background: #fff !important;
          color: #000 !important;
          border-color: #ccc !important;
          box-shadow: none !important;
        }
        body { margin: 0 !important; }
        /* Force the main content to take the full width (sidebar is hidden) */
        body > div > div[style*="margin-left"] { margin-left: 0 !important; }
        /* Remove the sticky behaviour and any restricted heights */
        [style*="position:sticky"], [style*="position: sticky"] { position: static !important; }
        [style*="100vh"], [style*="calc(100vh"] { height: auto !important; min-height: 0 !important; }
        [style*="overflow:hidden"], [style*="overflow: hidden"],
        [style*="overflowY:auto"], [style*="overflow-y: auto"] { overflow: visible !important; }
        /* Stop spinning animations */
        [style*="animation"] { animation: none !important; }
        /* Page breaks */
        h1, h2, h3 { page-break-after: avoid; }
        table, tr, td, th { page-break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
